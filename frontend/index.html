<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Person Details</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.35), transparent 35%),
                radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.35), transparent 35%),
                linear-gradient(135deg, #020617, #0f172a, #111827);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .page-wrapper {
            width: 100%;
            max-width: 1000px;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .badge {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #93c5fd;
            font-size: 14px;
            margin-bottom: 18px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 46px;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #38bdf8, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #cbd5e1;
            font-size: 17px;
            line-height: 1.6;
        }

        .main-card {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(20px);
            padding: 35px;
        }

        .button-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        button {
            border: none;
            cursor: pointer;
            padding: 18px 16px;
            border-radius: 16px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            transition: all 0.25s ease;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.25);
        }

        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 35px rgba(124, 58, 237, 0.45);
            background: linear-gradient(135deg, #0ea5e9, #9333ea);
        }

        button:active {
            transform: scale(0.97);
        }

        #result {
            min-height: 230px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.95));
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .placeholder {
            text-align: center;
            color: #94a3b8;
            font-size: 17px;
        }

        .loading {
            text-align: center;
            color: #38bdf8;
            font-size: 18px;
            font-weight: 600;
        }

        .error {
            text-align: center;
            color: #f87171;
            font-size: 17px;
            font-weight: 600;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 25px;
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #38bdf8, #a78bfa);
            color: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            box-shadow: 0 12px 35px rgba(56, 189, 248, 0.30);
        }

        .profile-name {
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .profile-role {
            color: #93c5fd;
            font-size: 16px;
            font-weight: 600;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .detail-box {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 14px;
            padding: 16px;
        }

        .label {
            display: block;
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .value {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            word-break: break-word;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            color: #64748b;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 34px;
            }

            .button-container {
                grid-template-columns: repeat(2, 1fr);
            }

            .details-grid {
                grid-template-columns: 1fr;
            }

            .main-card {
                padding: 24px;
            }
        }

        @media (max-width: 480px) {
            .button-container {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 30px;
            }
        }
    </style>
</head>

<body>

    <div class="page-wrapper">

        <div class="header">
            <div class="badge">AWS 3-Tier Application</div>
            <h1>Person Details Portal</h1>
            <p class="subtitle">
                Select a person to fetch live details from the Python backend and Amazon RDS database.
            </p>
        </div>

        <div class="main-card">

            <div class="button-container">
                <button onclick="fetchPerson('Ziyad')">Ziyad</button>
                <button onclick="fetchPerson('Sajith')">Sajith</button>
                <button onclick="fetchPerson('Malcky')">Malcky</button>
                <button onclick="fetchPerson('Vishnu')">Vishnu</button>
            </div>

            <div id="result">
                <p class="placeholder">Click a name to fetch details from RDS.</p>
            </div>

        </div>

        <div class="footer">
            Frontend: Nginx EC2 | Backend: Python Flask | Database: Amazon RDS MySQL
        </div>

    </div>

    <script>
        function fetchPerson(name) {
            const resultBox = document.getElementById("result");

            resultBox.innerHTML = `
                <p class="loading">Fetching details for ${name} from RDS...</p>
            `;

            fetch(`/api/person/${encodeURIComponent(name)}`)
                .then(response => response.json())
                .then(result => {
                    if (result.status === "error") {
                        resultBox.innerHTML =
                            `<p class="error"><b>Error:</b> ${result.message}</p>`;
                        return;
                    }

                    const person = result.data;
                    const initials = person.name.substring(0, 2).toUpperCase();

                    resultBox.innerHTML = `
                        <div class="profile-header">
                            <div class="avatar">${initials}</div>
                            <div>
                                <div class="profile-name">${person.name}</div>
                                <div class="profile-role">${person.designation}</div>
                            </div>
                        </div>

                        <div class="details-grid">
                            <div class="detail-box">
                                <span class="label">Name</span>
                                <div class="value">${person.name}</div>
                            </div>

                            <div class="detail-box">
                                <span class="label">Designation</span>
                                <div class="value">${person.designation}</div>
                            </div>

                            <div class="detail-box">
                                <span class="label">Email</span>
                                <div class="value">${person.email}</div>
                            </div>

                            <div class="detail-box">
                                <span class="label">Location</span>
                                <div class="value">${person.location}</div>
                            </div>
                        </div>
                    `;
                })
                .catch(error => {
                    resultBox.innerHTML =
                        `<p class="error"><b>Request failed:</b> ${error}</p>`;
                });
        }
    </script>

</body>
</html>
